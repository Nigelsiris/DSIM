<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        main { max-width: 800px; margin: 2rem auto; }
        #epjInfoDisplay {
            padding: 0.75rem; border-radius: 0.25rem;
            background-color: var(--card-background-color); border: var(--card-border);
            margin-top: 1rem; min-height: 70px;
        }
        input[readonly] { background-color: var(--pico-muted-border-color); }
        
        /* Store delivery indicator */
        .store-only-badge {
            background: #1976d2;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        
        /* Loading spinner for buttons */
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 1.2em;
            height: 1.2em;
            top: 50%;
            left: 50%;
            margin-top: -0.6em;
            margin-left: -0.6em;
            border: 3px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: btn-spin 0.6s linear infinite;
        }
        
        .btn-loading span {
            visibility: hidden;
        }

        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }
        
        /* Overspill styling */
        .overspill-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: #fff3e0;
            border: 2px solid #ff9800;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }
        
        .overspill-toggle:hover {
            background: #ffe0b2;
        }
        
        .overspill-toggle input[type="checkbox"] {
            width: 1.5rem;
            height: 1.5rem;
            cursor: pointer;
            margin: 0;
        }
        
        .overspill-toggle label {
            margin: 0;
            cursor: pointer;
            font-weight: 600;
            color: #e65100;
        }
        
        .overspill-toggle small {
            color: #f57c00;
        }
        
        .overspill-active {
            background: #ffcc80;
            border-color: #e65100;
        }
        
        .field-optional {
            opacity: 0.6;
        }
        
        .field-optional input {
            background: var(--pico-muted-border-color);
        }
        
        /* Pre-Load mode styling */
        .preload-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: #e3f2fd;
            border: 2px solid #2196f3;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }
        
        .preload-toggle:hover {
            background: #bbdefb;
        }
        
        .preload-toggle input[type="checkbox"] {
            width: 1.5rem;
            height: 1.5rem;
            cursor: pointer;
            margin: 0;
        }
        
        .preload-toggle label {
            margin: 0;
            cursor: pointer;
            font-weight: 600;
            color: #1565c0;
        }
        
        .preload-toggle small {
            color: #1976d2;
        }
        
        .preload-active {
            background: #90caf9;
            border-color: #1565c0;
        }
        
        /* Morning Mode indicator */
        .morning-mode-banner {
            background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
            border: 2px solid #fbc02d;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .morning-mode-banner span {
            font-weight: 600;
            color: #f57f17;
        }
        
        .morning-mode-banner small {
            color: #f9a825;
        }
        
        /* Announcements styles */
        .announcements-container {
            margin-bottom: 1rem;
        }
        .announcement-banner {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .announcement-banner.priority-normal {
            background: #e3f2fd;
            border: 1px solid #64b5f6;
        }
        .announcement-banner.priority-important {
            background: #fff3e0;
            border: 2px solid #ff9800;
        }
        .announcement-banner.priority-urgent {
            background: #ffebee;
            border: 2px solid #f44336;
            animation: pulse-urgent 2s infinite;
        }
        @keyframes pulse-urgent {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(244, 67, 54, 0); }
        }
        .announcement-banner .announcement-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .announcement-banner .announcement-content {
            flex: 1;
        }
        .announcement-banner .announcement-message {
            font-weight: 500;
            margin: 0;
            white-space: pre-wrap;
        }
        .announcement-banner .announcement-meta {
            font-size: 0.75rem;
            color: var(--muted-color);
            margin-top: 0.25rem;
        }
        .announcement-banner.priority-urgent .announcement-message {
            color: #c62828;
        }
        .announcement-banner.priority-important .announcement-message {
            color: #e65100;
        }
    </style>
</head>
<body>
    <main class="container">
        <article>
            <div style="position: absolute; top: 1rem; right: 1rem; display: flex; align-items: center; gap: 0.75rem; z-index: 10;">
                <button class="outline" onclick="loadProfilePage()">My Profile</button>
                <button class="contrast" onclick="logout()">Logout</button>
            </div>
            
            <h2>Driver Check-Out</h2>
            <p>Welcome, <b><?!= username; ?></b>. Please confirm your details to check out an EPJ.</p>
            
            <!-- Announcements Container -->
            <div id="announcementsContainer" class="announcements-container" style="display:none;"></div>
            
            <!-- Morning Mode Banner (shown between 6am-12pm) -->
            <div id="morningModeBanner" class="morning-mode-banner" style="display:none;">
                <span>☀️ Morning Mode</span>
                <small>All EPJs available including store delivery units</small>
            </div>

            <form id="checkOutForm">
                <!-- Pre-Load Toggle -->
                <div class="preload-toggle" id="preloadToggle">
                    <input type="checkbox" id="preloadCheckbox" name="preload">
                    <div>
                        <label for="preloadCheckbox">Pre-Load (No EPJ Required)</label><br>
                        <small>For drivers who don't need an EPJ for their route</small>
                    </div>
                </div>
                
                <!-- Overspill Toggle -->
                <div class="overspill-toggle" id="overspillToggle">
                    <input type="checkbox" id="overspillCheckbox" name="overspill">
                    <div>
                        <label for="overspillCheckbox">Overspill / No Load Assigned</label><br>
                        <small>Check this if you don't have an assigned load yet</small>
                    </div>
                </div>
                
                <div class="grid">
                    <label>Driver Name<input type="text" id="driverName" name="driverName" value="<?!= username; ?>" readonly></label>
                    <label id="truckLabel">Truck Number<input type="text" id="truckNumber" name="truckNumber" required></label>
                </div>
                <div class="grid">
                    <label id="trailerLabel">Trailer Number<input type="text" id="trailerNumber" name="trailerNumber" required></label>
                    <label id="routeLabel">Route<input type="text" id="route" name="route" placeholder="e.g. 1234 / ABC / Zone-5" required></label>
                </div>
                
                <hr>

                <div id="epjSection">
                    <label for="zoneFilter">Filter by Zone</label>
                    <select id="zoneFilter" disabled>
                        <option value="All" selected>Loading zones...</option>
                    </select>

                    <label for="epjNumber">Select EPJ</label>
                    <select id="epjNumber" name="epjNumber" required disabled>
                        <option value="" disabled selected>Loading...</option>
                    </select>

                    <div id="epjInfoDisplay"><small>Loading equipment data...</small></div>
                </div>

                <label for="faultReport">Pre-Trip: Report any existing issues (optional)</label>
                <textarea id="faultReport" name="faultReport" placeholder="e.g., Fork is slightly bent, battery cover is cracked..."></textarea>
                
                <button type="submit" id="submitBtn"><span>Complete Check-Out</span></button>
                <p id="feedback" style="text-align:center; min-height:20px;">Loading equipment data...</p>
            </form>
        </article>
    </main>
    <script>
        (function() {
            // Use the parent's sessionToken - do NOT redeclare with var/let/const
            var _token = (typeof sessionToken !== 'undefined' && sessionToken) ? sessionToken : "<?= token ?>";
            var _epjInfoMap = {};
            var _availableEpjsData = []; // Stores objects with epj and storeOnly flag
            var _allEpjsData = []; // All EPJs including store-only (for morning mode)
            var _zoneOptionsHtml = '';
            var _isMorningMode = false;

            var zoneFilter = document.getElementById('zoneFilter');
            var epjSelect = document.getElementById('epjNumber');
            var infoDisplay = document.getElementById('epjInfoDisplay');
            var submitBtn = document.getElementById('submitBtn');
            
            // Disable form until data loads
            if (submitBtn) submitBtn.disabled = true;
            if (zoneFilter) zoneFilter.disabled = true;
            
            // Check for Morning Mode (6am - 12pm)
            var currentHour = new Date().getHours();
            _isMorningMode = (currentHour >= 6 && currentHour < 12);
            if (_isMorningMode) {
                var banner = document.getElementById('morningModeBanner');
                if (banner) banner.style.display = 'flex';
            }

            // Route input - allow any characters (letters, numbers, slashes, etc.)
            var routeInput = document.getElementById('route');
            
            // Pre-Load toggle functionality
            var preloadCheckbox = document.getElementById('preloadCheckbox');
            var preloadToggle = document.getElementById('preloadToggle');
            var truckInput = document.getElementById('truckNumber');
            var trailerInput = document.getElementById('trailerNumber');
            var truckLabel = document.getElementById('truckLabel');
            var trailerLabel = document.getElementById('trailerLabel');
            var epjSection = document.getElementById('epjSection');
            var routeLabel = document.getElementById('routeLabel');
            
            if (preloadCheckbox) {
                preloadCheckbox.addEventListener('change', function() {
                    var isPreload = this.checked;
                    
                    // Toggle visual state
                    if (preloadToggle) {
                        preloadToggle.classList.toggle('preload-active', isPreload);
                    }
                    
                    // Disable overspill if preload is checked
                    var overspillCheckbox = document.getElementById('overspillCheckbox');
                    if (overspillCheckbox) {
                        if (isPreload) {
                            overspillCheckbox.checked = false;
                            overspillCheckbox.disabled = true;
                            var overspillToggle = document.getElementById('overspillToggle');
                            if (overspillToggle) overspillToggle.style.opacity = '0.5';
                        } else {
                            overspillCheckbox.disabled = false;
                            var overspillToggle = document.getElementById('overspillToggle');
                            if (overspillToggle) overspillToggle.style.opacity = '1';
                        }
                    }
                    
                    // Make truck/trailer optional when Pre-Load is checked, but keep values
                    if (truckInput) {
                        truckInput.required = !isPreload;
                    }
                    if (trailerInput) {
                        trailerInput.required = !isPreload;
                    }
                    if (truckLabel) truckLabel.classList.toggle('field-optional', isPreload);
                    if (trailerLabel) trailerLabel.classList.toggle('field-optional', isPreload);
                    
                    // Hide/show EPJ selection for preload (EPJ becomes optional)
                    if (epjSection) {
                        // Don't hide, but make it optional
                        if (isPreload) {
                            // Reset to show N/A option
                            updateEpjList(true);
                        } else {
                            updateEpjList(false);
                        }
                    }
                    
                    // Update EPJ select required attribute
                    if (epjSelect) {
                        epjSelect.required = !isPreload;
                    }
                });
            }
            
            // Overspill toggle functionality
            var overspillCheckbox = document.getElementById('overspillCheckbox');
            var overspillToggle = document.getElementById('overspillToggle');
            
            if (overspillCheckbox) {
                overspillCheckbox.addEventListener('change', function() {
                    var isOverspill = this.checked;
                    
                    // Toggle visual state
                    if (overspillToggle) {
                        if (isOverspill) {
                            overspillToggle.classList.add('overspill-active');
                        } else {
                            overspillToggle.classList.remove('overspill-active');
                        }
                    }
                    
                    // Update route field
                    if (routeInput) {
                        if (isOverspill) {
                            routeInput.value = 'OS / Overspill';
                            routeInput.readOnly = true;
                        } else {
                            routeInput.value = '';
                            routeInput.readOnly = false;
                            routeInput.placeholder = '1234 / 5678 / 9012';
                        }
                    }
                    
                    // Hide/show EPJ selection for overspill
                    if (epjSection) {
                        epjSection.style.display = isOverspill ? 'none' : 'block';
                    }
                    
                    // Update EPJ select required attribute
                    if (epjSelect) {
                        epjSelect.required = !isOverspill;
                    }
                    
                    // Update route label styling only
                    if (routeLabel) routeLabel.classList.toggle('field-optional', isOverspill);
                });
            }

            // Load data asynchronously
            google.script.run
                .withSuccessHandler(function(data) {
                    if (!data || !data.availableEpjs || typeof data.epjInfoMap !== 'object') {
                        var feedback = document.getElementById('feedback');
                        if (feedback) feedback.innerText = 'Error loading equipment data.';
                        if (infoDisplay) infoDisplay.innerHTML = '<small style="color:red">Could not load equipment data. Please try again or contact admin.</small>';
                        if (epjSelect) epjSelect.innerHTML = '<option disabled selected>Error loading EPJs</option>';
                        if (submitBtn) submitBtn.disabled = true;
                        return;
                    }
                    
                    // Store all EPJs for morning mode
                    _allEpjsData = data.availableEpjs
                        .map(function(item) {
                            if (typeof item === 'string') {
                                return { epj: item, storeOnly: false };
                            }
                            return item;
                        });
                    
                    // Process EPJ data - in Morning Mode, include all EPJs; otherwise filter out store-only
                    if (_isMorningMode) {
                        _availableEpjsData = _allEpjsData; // Include store-only EPJs
                    } else {
                        _availableEpjsData = _allEpjsData.filter(function(item) {
                            return !item.storeOnly; // Exclude store-only EPJs
                        });
                    }
                    
                    _epjInfoMap = data.epjInfoMap;
                    _zoneOptionsHtml = data.zoneOptions;

                    // Populate zone filter - clear and rebuild
                    if (zoneFilter) {
                        zoneFilter.innerHTML = '<option value="All" selected>Show All Zones</option>';
                        var tempDiv = document.createElement('div');
                        tempDiv.innerHTML = _zoneOptionsHtml;
                        Array.from(tempDiv.querySelectorAll('option')).forEach(function(opt) {
                            zoneFilter.appendChild(opt.cloneNode(true));
                        });
                        zoneFilter.disabled = false;
                    }

                    // Enable form
                    if (submitBtn) submitBtn.disabled = false;
                    var feedback = document.getElementById('feedback');
                    if (feedback) feedback.innerText = '';
                    if (infoDisplay) infoDisplay.innerHTML = '<small>Select an EPJ to see its last reported status.</small>';

                    // Initialize EPJ list
                    updateEpjList();
                    
                    // Apply site-wide defaults from admin settings
                    if (data.siteSettings) {
                        var ss = data.siteSettings;
                        // Default overspill toggle
                        if (ss.defaultOverspill && overspillCheckbox && !overspillCheckbox.checked) {
                            overspillCheckbox.checked = true;
                            overspillCheckbox.dispatchEvent(new Event('change'));
                        }
                        // Default preload toggle
                        if (ss.defaultPreload && preloadCheckbox && !preloadCheckbox.checked) {
                            preloadCheckbox.checked = true;
                            preloadCheckbox.dispatchEvent(new Event('change'));
                        }
                        // Update morning mode hours from config
                        if (ss.morningModeStartHour != null && ss.morningModeEndHour != null) {
                            var h = new Date().getHours();
                            _isMorningMode = (h >= ss.morningModeStartHour && h < ss.morningModeEndHour);
                            var banner = document.getElementById('morningModeBanner');
                            if (banner) banner.style.display = _isMorningMode ? 'flex' : 'none';
                            if (_isMorningMode) {
                                _availableEpjsData = _allEpjsData;
                            } else {
                                _availableEpjsData = _allEpjsData.filter(function(item) { return !item.storeOnly; });
                            }
                            updateEpjList();
                        }
                        // Show site message banner if set
                        if (ss.siteMessage) {
                            var msgBanner = document.createElement('div');
                            msgBanner.className = 'announcement-banner priority-important';
                            msgBanner.innerHTML = '<span class="announcement-icon">📢</span><div class="announcement-content"><p class="announcement-message">' + escapeHtmlCheckout(ss.siteMessage) + '</p></div>';
                            var announcementsContainer = document.getElementById('announcementsContainer');
                            if (announcementsContainer) {
                                announcementsContainer.prepend(msgBanner);
                                announcementsContainer.style.display = 'block';
                            }
                        }
                    }
                })
                .withFailureHandler(function(error) {
                    var feedback = document.getElementById('feedback');
                    if (feedback) feedback.innerText = 'Error loading data: ' + (error.message || 'Unknown error');
                    if (infoDisplay) infoDisplay.innerHTML = '<small style="color:red">Could not load equipment data. Please try again or contact admin.</small>';
                    if (epjSelect) epjSelect.innerHTML = '<option disabled selected>Error loading EPJs</option>';
                    if (submitBtn) submitBtn.disabled = true;
                })
                .getCheckoutFormData({token: _token});
            
            // Load announcements for drivers
            google.script.run
                .withSuccessHandler(function(announcements) {
                    var container = document.getElementById('announcementsContainer');
                    if (!container || !announcements || announcements.length === 0) return;
                    
                    var html = '';
                    announcements.forEach(function(ann) {
                        var priorityClass = 'priority-' + ann.priority;
                        var icon = ann.priority === 'urgent' ? '⚠️' : (ann.priority === 'important' ? '📣' : '📢');
                        
                        html += '<div class="announcement-banner ' + priorityClass + '">';
                        html += '<span class="announcement-icon">' + icon + '</span>';
                        html += '<div class="announcement-content">';
                        html += '<p class="announcement-message">' + escapeHtmlCheckout(ann.message) + '</p>';
                        html += '<div class="announcement-meta">Posted ' + ann.created + '</div>';
                        html += '</div>';
                        html += '</div>';
                    });
                    
                    container.innerHTML = html;
                    container.style.display = 'block';
                })
                .withFailureHandler(function(err) {
                    console.log('Could not load announcements:', err);
                })
                .getActiveAnnouncements({token: _token});
            
            function escapeHtmlCheckout(text) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(text));
                return div.innerHTML;
            }

            function updateEpjList(includeNaOption) {
                var selectedZone = zoneFilter ? zoneFilter.value : 'All';
                if (epjSelect) {
                    epjSelect.innerHTML = ''; 
                    epjSelect.disabled = false;
                }
                var epjsShown = 0;
                
                // Add N/A option at top if in Pre-Load mode
                if (includeNaOption && epjSelect) {
                    var naOption = document.createElement('option');
                    naOption.value = 'N/A - None Required';
                    naOption.textContent = 'N/A - None Required';
                    epjSelect.appendChild(naOption);
                    epjsShown++;
                }
                
                _availableEpjsData.forEach(function(item) {
                    var epj = item.epj;
                    var epjLocation = _epjInfoMap[epj] ? _epjInfoMap[epj].location : 'Unknown';
                    
                    // Apply zone filter
                    var matchesZone = selectedZone === 'All' || epjLocation === selectedZone;
                    
                    if (matchesZone && epjSelect) {
                        var option = document.createElement('option');
                        option.value = epj;
                        // In morning mode, indicate store-only EPJs
                        if (_isMorningMode && item.storeOnly) {
                            option.textContent = epj + ' [Store]';
                        } else {
                            option.textContent = epj;
                        }
                        epjSelect.appendChild(option);
                        epjsShown++;
                    }
                });

                if (epjsShown === 0 && epjSelect) {
                    var option = document.createElement('option');
                    option.textContent = 'No available EPJs in this zone';
                    option.disabled = true;
                    epjSelect.appendChild(option);
                }
                
                if (epjSelect) epjSelect.value = includeNaOption ? 'N/A - None Required' : ''; 
                if (infoDisplay) infoDisplay.innerHTML = '<small>Select an EPJ to see its last reported status.</small>';
            }
            
            if (zoneFilter) {
                zoneFilter.addEventListener('change', function() {
                    var isPreload = preloadCheckbox && preloadCheckbox.checked;
                    updateEpjList(isPreload);
                });
            }
            
            if (epjSelect) {
                epjSelect.addEventListener('change', function() {
                    var selectedEpj = this.value;
                    if (selectedEpj === 'N/A - None Required') {
                        if (infoDisplay) infoDisplay.innerHTML = '<small>No EPJ will be assigned for this trip.</small>';
                        return;
                    }
                    if (selectedEpj && _epjInfoMap[selectedEpj]) {
                        var info = _epjInfoMap[selectedEpj];
                        var epjData = _availableEpjsData.find(function(item) { return item.epj === selectedEpj; });
                        var storeOnlyBadge = epjData && epjData.storeOnly 
                            ? '<span class="store-only-badge">🏪 STORE DELIVERY ONLY</span>' 
                            : '';
                            
                        if (infoDisplay) {
                            infoDisplay.innerHTML = '<small><b>EPJ:</b> ' + selectedEpj + ' ' + storeOnlyBadge + '<br><b>Last Location:</b> ' + (info.location || 'N/A') + '<br><b>Last Reported Fault:</b> ' + (info.fault || 'None') + '</small>';
                        }
                    } else if (infoDisplay) {
                        infoDisplay.innerHTML = '<small>Select an EPJ to see its last reported status.</small>';
                    }
                });
            }

            var checkOutForm = document.getElementById('checkOutForm');
            if (checkOutForm) {
                checkOutForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var isOverspill = overspillCheckbox && overspillCheckbox.checked;
                    var isPreload = preloadCheckbox && preloadCheckbox.checked;
                    var selectedEpj = epjSelect ? epjSelect.value : '';
                    
                    var formData = {
                        token: _token,
                        driverName: document.getElementById('driverName') ? document.getElementById('driverName').value : '',
                        truckNumber: document.getElementById('truckNumber') ? document.getElementById('truckNumber').value : '',
                        trailerNumber: document.getElementById('trailerNumber') ? document.getElementById('trailerNumber').value : '',
                        route: document.getElementById('route') ? document.getElementById('route').value : '',
                        epjNumber: isOverspill ? '' : selectedEpj,
                        faultReport: document.getElementById('faultReport') ? document.getElementById('faultReport').value : '',
                        isOverspill: isOverspill,
                        isPreload: isPreload
                    };
                    
                    // Only require EPJ if not overspill and not preload (or preload with no selection)
                    if (!isOverspill && !isPreload && !formData.epjNumber) { 
                        alert('Please select an EPJ.'); 
                        return; 
                    }
                    
                    // Show loading state on button
                    if (submitBtn) {
                        submitBtn.classList.add('btn-loading');
                        submitBtn.disabled = true;
                    }
                    var feedback = document.getElementById('feedback');
                    if (feedback) feedback.innerText = '';
                    
                    google.script.run
                        .withSuccessHandler(onCheckoutSuccess)
                        .withFailureHandler(function(error) {
                            if (submitBtn) {
                                submitBtn.classList.remove('btn-loading');
                                submitBtn.disabled = false;
                            }
                            if (feedback) feedback.innerText = '';
                            alert('Error: ' + (error.message || 'Unknown error'));
                        })
                        .processCheckOut(formData);
                });
            }
            
            function onCheckoutSuccess(message) {
                if (message && message.startsWith && message.startsWith('Error:')) {
                    if (submitBtn) {
                        submitBtn.classList.remove('btn-loading');
                        submitBtn.disabled = false;
                    }
                    var feedback = document.getElementById('feedback');
                    if (feedback) feedback.innerText = '';
                    alert(message);
                } else {
                    // Instant redirect — no 2-second wait
                    if (typeof logout === 'function') logout();
                }
            }
            
            // Inactivity timeout - return to login after 2 minutes of no activity
            var inactivityTimeout;
            var INACTIVITY_LIMIT = 2 * 60 * 1000; // 2 minutes in milliseconds
            
            function resetInactivityTimer() {
                clearTimeout(inactivityTimeout);
                inactivityTimeout = setTimeout(function() {
                    if (typeof logout === 'function') {
                        logout();
                    }
                }, INACTIVITY_LIMIT);
            }
            
            // Track user activity
            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(function(event) {
                document.addEventListener(event, resetInactivityTimer, { passive: true });
            });
            
            // Start the inactivity timer
            resetInactivityTimer();
        })();
    </script>
</body>
</html>
