<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style> main { max-width: 600px; margin: 2rem auto; } </style>
</head>
<body>
    <main class="container">
        <article>
            <h2>My Profile</h2>
            <p>Welcome, <b><?!= username; ?></b>. Use this page to change your password.</p>
            
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" required>
            
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required>

            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>

            <button id="changePasswordButton">Change Password</button>
            <p id="feedback" style="text-align:center; min-height:20px;"></p>
        </article>
        
        <button class="secondary outline back-btn" style="margin-top: 1rem;">Back to Main Screen</button>

    </main>
    <script>
        (function() {
            // Get token: prefer template-injected value, then fall back to parent scope / localStorage
            var _token = (typeof token !== 'undefined' && token) ? token : null;
            if (!_token && typeof sessionToken !== 'undefined' && sessionToken) {
                _token = sessionToken;
            }
            if (!_token) {
                _token = localStorage.getItem('sessionToken');
            }

            document.getElementById('changePasswordButton').addEventListener('click', function() {
                var currentPass = document.getElementById('currentPassword').value;
                var newPass = document.getElementById('newPassword').value;
                var confirmPass = document.getElementById('confirmPassword').value;
                var feedback = document.getElementById('feedback');

                if (!currentPass || !newPass || !confirmPass) {
                    feedback.innerText = 'All fields are required.';
                    return;
                }
                if (newPass !== confirmPass) {
                    feedback.innerText = 'New passwords do not match.';
                    return;
                }

                feedback.innerText = 'Updating password...';
                google.script.run
                    .withSuccessHandler(function(message) {
                        feedback.innerText = message;
                        // Clear fields on success
                        if (message && message.includes('successfully')) {
                            document.getElementById('currentPassword').value = '';
                            document.getElementById('newPassword').value = '';
                            document.getElementById('confirmPassword').value = '';
                        }
                    })
                    .withFailureHandler(function(error) {
                        feedback.innerText = 'Error: ' + (error.message || 'Unknown error');
                    })
                    .driverChangePassword({
                        token: _token,
                        currentPassword: currentPass,
                        newPassword: newPass
                    });
            });

            // Back button: use proper token (works for Drivers who don't have localStorage token)
            document.querySelector('.back-btn').addEventListener('click', function() {
                if (_token) {
                    google.script.run.withSuccessHandler(function(html) {
                        if (typeof loadView === 'function') {
                            loadView(html);
                        } else if (typeof goBackToUserView === 'function') {
                            goBackToUserView();
                        }
                    }).getUserView(_token);
                } else if (typeof goBackToUserView === 'function') {
                    goBackToUserView();
                }
            });
        })();
    </script>
</body>
</html>
